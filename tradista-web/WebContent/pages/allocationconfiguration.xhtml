<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/WEB-INF/template.xhtml">
	<ui:define name="title">Eclipse Tradista Allocation Configuration</ui:define>
	<ui:define name="viewname">Eclipse Tradista Allocation Configuration</ui:define>
	<ui:define name="content">
		<h:form id="allocationConfigurationForm">
			<p:panel styleClass="tradista-central-component"
				header="Allocation Configuration">
				<p:panelGrid id="allocationConfiguration"
					header="Allocation Configuration" styleClass="tradista-nested"
					columnClasses="ui-g-12 ui-md-12 ui-lg-12, ui-g-12 ui-md-12 ui-lg-12">
					<p:messages showDetail="true" closable="true" id="msg">
						<p:autoUpdate />
					</p:messages>
					<p:row>
						<p:column>
							<p:outputLabel styleClass="tradista-menu-item"
								value="Allocation Configuration Name :" />
						</p:column>
						<p:column>
							<p:inputText
								value="#{allocationConfigurationController.allocationConfigurationName}"
								styleClass="tradista-menu-item"
								readonly="#{allocationConfigurationController.allocationConfiguration ne null}" />
						</p:column>
					</p:row>
					<p:row rendered="#{empty userManager.currentUserProcessingOrg and empty menuController.currentProcessingOrg}">
						<p:column>
							<p:outputLabel styleClass="tradista-menu-item"
								value="Processing Org :" />
						</p:column>
						<p:column>
							<p:selectOneMenu
								value="#{allocationConfigurationController.processingOrg}"
								styleClass="tradista-menu-item" converter="legalEntityConverter"
								disabled="#{allocationConfigurationController.allocationConfiguration ne null}">
								<f:selectItems
									value="#{allocationConfigurationController.allProcessingOrgs}" />
							</p:selectOneMenu>
						</p:column>
					</p:row>
					<p:row>
						<p:column colspan="2">
							<p:card>
								<p:pickList id="allocationConfigurationPickList"
									value="#{allocationConfigurationController.books}" var="book"
									itemValue="#{book}" itemLabel="#{allocationConfigurationController.getDisambiguatedBookName(book)}"
									showSourceControls="true" showTargetControls="true"
									showCheckbox="true" showSourceFilter="true"
									showTargetFilter="true" filterMatchMode="contains"
									responsive="true" converter="bookConverter">
									<f:facet name="sourceCaption">Available books</f:facet>
									<f:facet name="targetCaption">Configured books</f:facet>
									<p:column styleClass="tradista-picklist-item">
										<div class="flex align-items-center">
											<h:outputText value="#{allocationConfigurationController.getDisambiguatedBookName(book)}" />
										</div>
									</p:column>
								</p:pickList>
							</p:card>
						</p:column>
					</p:row>
				</p:panelGrid>
				<f:facet name="footer">
					<p:row>
						<p:column>
							<p:commandButton value="Save" styleClass="rounded-button"
								action="#{allocationConfigurationController.checkSave()}"
								update="@form saveConfirmationForm">
							</p:commandButton>
							<p:commandButton value="Copy" styleClass="rounded-button"
								action="#{allocationConfigurationController.prepareCopy()}"
								oncomplete="PF('copy').show()"
								update="copyForm"
								rendered="#{allocationConfigurationController.allocationConfiguration ne null}" />
							<p:commandButton value="New" styleClass="rounded-button"
								action="#{allocationConfigurationController.clear()}"
								update="@form" />
							<p:outputLabel value="Load by Allocation Configuration"
								styleClass="tradista-menu-item" />
							<p:selectOneMenu
								value="#{allocationConfigurationController.loadAllocationConfiguration}"
								styleClass="tradista-menu-item" converter="allocationConfigurationConverter">
								<f:selectItems value="#{allocationConfigurationController.allAllocationConfigurations}" var="ac" itemLabel="#{allocationConfigurationController.getDisambiguatedName(ac)}" itemValue="#{ac}" />
							</p:selectOneMenu>
							<p:commandButton value="Load" styleClass="rounded-button"
								action="#{allocationConfigurationController.load()}"
								update="@form" />
						</p:column>
					</p:row>
				</f:facet>
			</p:panel>
		</h:form>
		<h:form id="copyForm" style="position: absolute;visibility: hidden;">
			<p:dialog header="Allocation Configuration Copy" widgetVar="copy"
				showEffect="fade" modal="true">
				<p:panelGrid id="allocationConfiguration"
					columnClasses="ui-g-12 ui-md-12 ui-lg-12, ui-g-12 ui-md-12 ui-lg-12">
					<p:row>
						<p:column colspan="2">
							<p:outputPanel id="copyMsg">
								<h:outputText value="#{allocationConfigurationController.copyMessage}" />
							</p:outputPanel>
						</p:column>
					</p:row>
					<p:row>
						<p:column>
							<p:outputLabel
								value="Please choose an Allocation Configuration name :" />
						</p:column>
						<p:column>
							<p:inputText
								value="#{allocationConfigurationController.copyAllocationConfigurationName}" />
						</p:column>
					</p:row>
					<p:row>
						<p:column>
							<p:outputLabel styleClass="tradista-menu-item"
								value="Please choose a Processing Org :"
								rendered="#{empty userManager.currentUserProcessingOrg}" />
						</p:column>
						<p:column>
							<p:selectOneMenu
								value="#{allocationConfigurationController.copyProcessingOrg}"
								styleClass="tradista-menu-item"
								rendered="#{empty userManager.currentUserProcessingOrg}"
								converter="legalEntityConverter">
								<f:selectItems
									value="#{allocationConfigurationController.allProcessingOrgs}" />
								<p:ajax event="change" update="copyMsg" />
							</p:selectOneMenu>
						</p:column>
					</p:row>
				</p:panelGrid>
				<f:facet name="footer">
					<p:commandButton value="Copy" styleClass="rounded-button"
						oncomplete="PF('copy').hide()"
						update=":allocationConfigurationForm:allocationConfiguration">
						<f:actionListener
							binding="#{allocationConfigurationController.copy()}" />
					</p:commandButton>
					<p:commandButton value="Cancel" styleClass="rounded-button"
						onclick="PF('copy').hide()" />
				</f:facet>
			</p:dialog>
		</h:form>
		<h:form id="saveConfirmationForm" style="position: absolute;visibility: hidden;">
			<p:dialog header="Save an Allocation Configuration" widgetVar="saveConfirmation"
				showEffect="fade" modal="true">
				<p:panelGrid id="saveConfirmationPanel"
					columnClasses="ui-g-12 ui-md-12 ui-lg-12, ui-g-12 ui-md-12 ui-lg-12">
					<p:row>
						<p:column colspan="2">
							<p:outputPanel id="saveMsg">
								<h:outputText value="#{allocationConfigurationController.saveMessage}" />
							</p:outputPanel>
						</p:column>
					</p:row>
					<p:row>
						<p:column>
							<p:outputLabel styleClass="tradista-menu-item"
								value="Processing Org :" />
						</p:column>
						<p:column>
							<p:selectOneMenu
								value="#{allocationConfigurationController.processingOrg}"
								styleClass="tradista-menu-item" converter="legalEntityConverter">
								<f:selectItems
									value="#{allocationConfigurationController.allProcessingOrgs}" />
								<p:ajax event="change" update="saveMsg" />
							</p:selectOneMenu>
						</p:column>
					</p:row>
					<p:row>
						<p:column>
							<p:commandButton value="Save" styleClass="rounded-button"
								action="#{allocationConfigurationController.save()}"
								oncomplete="PF('saveConfirmation').hide()"
								update="allocationConfigurationForm" />
						</p:column>
						<p:column>
							<p:commandButton value="Cancel" styleClass="rounded-button"
								type="button" onclick="PF('saveConfirmation').hide()" />
						</p:column>
					</p:row>
				</p:panelGrid>
			</p:dialog>
		</h:form>
	</ui:define>
</ui:composition>
