<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	<p:panel id="book" header="Book"
		styleClass="flex flex-column flex-1 tradista">
		<p:tabView>
			<p:tab title="Product">
				<p:card>
					<p:chart value="#{bookController.productDonutModel}"
						styleClass="h-full flex flex-column" type="donut" />
				</p:card>
			</p:tab>
			<p:tab title="Cash">
				<p:card>
					<p:chart value="#{bookController.cashDonutModel}"
						styleClass="h-full flex flex-column" type="donut" />
				</p:card>
			</p:tab>
		</p:tabView>
	</p:panel>
</ui:composition>
